<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSポータル - 管理デスク</title>
    <style>
        /* ─── ベース設定（ポータル風ホワイト＆ブルー） ─── */
        body {
            background-color: #f4f7fc;
            color: #333;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
        }

        /* ─── ログイン画面のスタイル ─── */
        .login-container {
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        .login-container h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        /* ─── メインレイアウト（ログイン後） ─── */
        .portal-wrapper {
            display: none; /* 初期状態は非表示 */
            width: 100%;
            display: flex;
        }

        /* 左側サイドバー */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid #e3e8f0;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            box-sizing: border-box;
        }
        .sidebar-brand {
            padding: 24px;
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            border-bottom: 1px solid #f0f4f8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-user {
            padding: 16px 24px;
            font-size: 14px;
            color: #718096;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-icon {
            width: 32px;
            height: 32px;
            background: #e2e8f0;
            border-radius: 50%;
            display: inline-block;
        }
        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 20px 0 0 0;
            flex-grow: 1;
        }
        .menu-item {
            padding: 14px 24px;
            color: #4a5568;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .menu-item:hover {
            background-color: #f7fafc;
            color: #3182ce;
        }
        .menu-item.active {
            background-color: #edf2f7;
            color: #2b6cb0;
            border-left: 4px solid #3182ce;
            padding-left: 20px; /* ボーダー分調整 */
        }
        .logout-btn {
            padding: 20px 24px;
            color: #e53e3e;
            border-top: 1px solid #f0f4f8;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* 右側メインエリア */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            flex-grow: 1;
            box-sizing: border-box;
        }

        /* 各コンテンツセクション */
        .content-section {
            display: none; /* 切り替え用につど非表示にする */
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            max-width: 800px;
        }
        .content-section.active {
            display: block; /* activeクラスがついたものだけ表示 */
        }
        .section-title {
            margin-top: 0;
            font-size: 22px;
            color: #2d3748;
            margin-bottom: 25px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
        }

        /* ─── フォームパーツの共通スタイル ─── */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a5568;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        .btn-primary {
            background: #3182ce;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-primary:hover { background: #2b6cb0; }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            background: #f7fafc;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="login-container">
        <h2>HSポータル ログイン</h2>
        <input type="password" id="passwordInput" class="login-input" placeholder="パスワードを入力">
        <button onclick="checkPassword()" class="login-btn">LOGIN</button>
    </div>

    <div id="portalPage" class="portal-wrapper" style="display: none;">
        
        <div class="sidebar">
            <div class="sidebar-brand">🔑 HSポータル</div>
            <div class="sidebar-user">
                <span class="user-icon"></span>
                <span>busuzimayako85</span>
            </div>
