<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ORDER SITE - Firebase Connected</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebaseの設定（あなたのサイト専用の鍵）
        const firebaseConfig = {
            apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
            authDomain: "busuzimayako85-order.firebaseapp.com",
            projectId: "busuzimayako85-order",
            storageBucket: "busuzimayako85-order.firebasestorage.app",
            messagingSenderId: "921095725285",
            appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 送信ボタンが押された時の処理
        window.sendOrder = async function() {
            const name = document.getElementById('userName').value;
            const message = document.getElementById('userMessage').value;
            const total = document.getElementById('totalDisplay').innerText;

            if(!name || !message) { alert("名前とメッセージを入力してください"); return; }

            try {
                await addDoc(collection(db, "orders"), {
                    name: name,
                    message: message,
                    total: total,
                    date: new Date()
                });
                alert("送信完了しました！");
            } catch (e) {
                alert("エラーが発生しました: " + e.message);
            }
        };
    </script>
    <style>
        /* 前回のデザインを継続 */
        body { background-color: #0b0b0b; color: #f0f0f0; font-family: sans-serif; padding: 20px; }
        .order-form { background: #1a1a1a; padding: 20px; border: 1px solid #ff0055; margin-top: 20px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; }
    </style>
</head>
<body>
    <h1>ORDER & ESTIMATION</h1>
    <div id="illustrationContainer"></div>
    <div class="total-box">
        TOTAL: <span id="totalDisplay">0 円</span>
    </div>

    <div class="order-form">
        <h3>CUSTOMER INFO</h3>
        <input type="text" id="userName" placeholder="お名前">
        <textarea id="userMessage" placeholder="ご依頼詳細・相談"></textarea>
        <button onclick="sendOrder()">SEND ORDER</button>
    </div>

    <script>
        /* ここに前回の計算ロジックやaddNewCard関数を追記してください */
        // （長くなるため省略していますが、前回のコードの最下部にある関数群をそのまま維持してください）
    </script>
</body>
</html>
