<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理画面】busuzimayako85 イラストオーダー</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: Arial, sans-serif; padding: 20px; margin: 0; }
        .admin-container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { color: #fff; border-bottom: 2px solid #d500f9; padding-bottom: 10px; font-size: 28px; margin-top: 0; }
        h2 { color: #00e5ff; margin-top: 30px; font-size: 20px; }
        .section { background: #252525; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0b0b0b; display:flex; justify-content:center; align-items:center; z-index:1000; }
        .login-box { background:#1e1e1e; padding:40px; border-radius:8px; border:2px solid #d500f9; text-align:center; max-width:400px; width:90%; }
        .tmpl-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; margin-right: 5px; margin-bottom: 5px; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .tmpl-btn:hover { background: #444; border-color: #00e5ff; }
        .input-text { width: 100%; padding: 12px; background: #121212; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; margin-top: 10px; font-size: 16px; }
        .save-btn { background: #d500f9; color: #fff; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .radio-label { display: block; margin-top: 10px; font-size: 14px; color: #aaa; cursor: pointer; }
        .order-list { margin-top: 15px; }
        .no-orders { text-align: center; padding: 30px; color: #666; font-size: 14px; background: #1a1a1a; border-radius: 4px; border: 1px dashed #333; }
        .order-card { background: #1d1d1d; border: 1px solid #333; border-left: 5px solid #00e5ff; border-radius: 4px; padding: 20px; margin-bottom: 15px; }
        .order-card.status-対応中 { border-left-color: #ffea00; }
        .order-card.status-完了 { border-left-color: #00e676; opacity: 0.7; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #2a2a2a; padding-bottom: 10px; margin-bottom: 15px; }
        .name { font-size: 18px; font-weight: bold; color: #fff; }
        .contact { font-size: 13px; color: #00e5ff; }
        .order-details-box { background: #151515; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
        .comment-box { background: #221a24; border-left: 3px solid #d500f9; padding: 10px; font-size: 13px; margin-bottom: 15px; white-space: pre-wrap; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #2a2a2a; padding-top: 12px; }
        .status-select { background: #121212; color: #fff; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .delete-btn { background: #331111; color: #ff5252; border: 1px solid #552222; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
            authDomain: "busuzimayako85-order.firebaseapp.com",
            projectId: "busuzimayako85-order",
            storageBucket: "busuzimayako85-order.firebasestorage.app",
            messagingSenderId: "921095725285",
            appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let allOrders = [];
        let currentFilter = '全て';

        // ログイン処理
        window.checkLogin = async () => {
            if (document.getElementById('passwordInput').value === '85admin') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                // Firestore監視開始
                const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
                onSnapshot(q, (snap) => {
                    allOrders = [];
                    snap.forEach(d => allOrders.push({id: d.id, ...d.data()}));
                    renderOrders();
                });
                // 設定読み込み
                const docSnap = await getDoc(doc(db, "settings", "schedule"));
                if(docSnap.exists()){
                    document.getElementById('scheduleInput').value = docSnap.data().text;
                    document.getElementById(docSnap.data().mode === 'stop' ? 'modeStop' : 'modeNormal').checked = true;
                }
            } else alert('パスワードが違います。');
        };

        // 絞り込み実行
        window.filterOrders = (val) => { currentFilter = val; renderOrders(); };

        // 描画関数
        window.renderOrders = () => {
            const container = document.getElementById('orderListContainer');
            container.innerHTML = '';
            
            const filtered = allOrders.filter(o => currentFilter === '全て' || (o.status || '未対応') === currentFilter);
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-orders">該当する依頼はありません。</div>';
                return;
            }

            filtered.forEach(data => {
                const status = data.status || '未対応';
                
                // イラスト詳細の復元
                let detailsHtml = '';
                if (Array.isArray(data.details)) {
                    data.details.forEach((item, idx) => {
                        const bName = TRANSLATIONS.base[item.base] || item.base;
                        const bgName = TRANSLATIONS.bg[item.bg] || item.bg;
                        detailsHtml += `<div style="margin-bottom:8px;">
                            <div class="detail-item-title">🎨 イラスト #${idx + 1}</div>
                            <div class="detail-bullet">・ベース: ${bName}</div>
                            <div class="detail-bullet">・背景: ${bgName}</div>
                        </div>`;
                    });
                }

                // メッセージの復元
                const commentHtml = data.clientComment 
                    ? `<div class="comment-box"><strong>💬 メッセージ:</strong><br>${data.clientComment}</div>` 
                    : '';

                container.insertAdjacentHTML('beforeend', `
                    <div class="order-card status-${status}">
                        <div class="order-header">
                            <div>
                                <div class="name">${data.clientName || '名前なし'}</div>
                                <div class="contact">🔑 連絡先: ${data.clientContact || '未記入'}</div>
                            </div>
                        </div>
                        <div class="order-details-box">${detailsHtml}</div>
                        ${commentHtml}
                        <div class="order-footer">
                            <div class="order-total">合計: ${(data.finalTotal || 0).toLocaleString()} 円</div>
                            <div class="controls">
                                <button class="tmpl-btn" style="background:#00e5ff; color:#000;" onclick="window.copyStatusUrl('${data.id}')">🔗 URLコピー</button>
                                <select class="status-select" onchange="window.updateOrderStatus('${data.id}', this.value)">
                                    <option value="未対応" ${status==='未対応'?'selected':''}>🔴 未対応</option>
                                    <option value="対応中" ${status==='対応中'?'selected':''}>🟡 対応中</option>
                                    <option value="完了" ${status==='完了'?'selected':''}>🟢 完了</option>
                                </select>
                                <button class="delete-btn" onclick="window.deleteOrder('${data.id}')">削除</button>
                            </div>
                        </div>
                    </div>
                `);
            });
        };

        // 共通機能
        window.copyStatusUrl = (id) => {
            const url = window.location.origin + window.location.pathname.replace('admin.html', '') + 'status.html?id=' + id;
            navigator.clipboard.writeText(url).then(() => alert('コピーしました！'));
        };
        window.updateOrderStatus = async (id, status) => await updateDoc(doc(db, "orders", id), { status });
        window.deleteOrder = async (id) => { if(confirm("削除しますか？")) await deleteDoc(doc(db, "orders", id)); };
        window.updateSchedule = async () => {
            await setDoc(doc(db, "settings", "schedule"), { text: document.getElementById('scheduleInput').value, mode: document.querySelector('input[name="siteMode"]:checked').value });
            alert("保存しました");
        };
        window.useTemplate = (t, m) => { document.getElementById('scheduleInput').value = t; document.getElementById(m==='stop'?'modeStop':'modeNormal').checked = true; };
    </script>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>ADMIN LOGIN</h2>
            <input type="password" id="passwordInput" class="input-text" placeholder="PASSWORD">
            <button class="save-btn" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>
    <div class="admin-container" id="adminContent" style="display:none;">
        <h1>busuzimayako85 管理デスク</h1>
        <div class="section">
            <h2>① 受付状況設定</h2>
            <input type="text" id="scheduleInput" class="input-text">
            <label class="radio-label"><input type="radio" name="siteMode" id="modeNormal" value="normal"> 受付中</label>
            <label class="radio-label"><input type="radio" name="siteMode" id="modeStop" value="stop"> 停止中</label>
            <button class="save-btn" onclick="updateSchedule()">更新</button>
        </div>
        <div class="section">
            <h2>② 受信した依頼一覧</h2>
            <select class="status-select" style="width:100%; margin-bottom:20px;" onchange="filterOrders(this.value)">
                <option value="全て">▼ すべてのステータスを表示</option>
                <option value="未対応">🔴 未対応のみ</option>
                <option value="対応中">🟡 対応中のみ</option>
                <option value="完了">🟢 完了のみ</option>
            </select>
            <div class="order-list" id="orderListContainer"></div>
        </div>
    </div>
</body>
</html>
