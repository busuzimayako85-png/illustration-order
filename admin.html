<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ORDER MANAGEMENT</title>
    <style>
        body { background: #111; color: #fff; padding: 20px; font-family: sans-serif; }
        .order-item { background: #222; border: 1px solid #ff0055; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>ORDER LIST</h1>
    <div id="orderList">読み込み中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
            authDomain: "busuzimayako85-order.firebaseapp.com",
            projectId: "busuzimayako85-order",
            storageBucket: "busuzimayako85-order.firebasestorage.app",
            messagingSenderId: "921095725285",
            appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadOrders() {
            const querySnapshot = await getDocs(collection(db, "orders"));
            const list = document.getElementById('orderList');
            list.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                list.innerHTML += `
                    <div class="order-item">
                        <strong>名前:</strong> ${data.name}<br>
                        <strong>詳細:</strong> ${data.message}<br>
                        <strong>金額:</strong> ${data.total}
                    </div>`;
            });
        }
        loadOrders();
    </script>
</body>
</html>
