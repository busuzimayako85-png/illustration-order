<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理画面】busuzimayako85 イラストオーダー</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: Arial, sans-serif; padding: 20px; margin: 0; }
        .admin-container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { color: #fff; border-bottom: 2px solid #d500f9; padding-bottom: 10px; font-size: 28px; margin-top: 0; }
        h2 { color: #00e5ff; margin-top: 30px; font-size: 20px; }
        .section { background: #252525; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        
        /* ログイン画面のスタイル */
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0b0b0b; display:flex; justify-content:center; align-items:center; z-index:1000; }
        .login-box { background:#1e1e1e; padding:40px; border-radius:8px; border:2px solid #d500f9; text-align:center; max-width:400px; width:90%; }
        
        /* 共通コンポーネント */
        .tmpl-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; margin-right: 5px; margin-bottom: 5px; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .tmpl-btn:hover { background: #444; border-color: #00e5ff; }
        .input-text { width: 100%; padding: 12px; background: #121212; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; margin-top: 10px; font-size: 16px; }
        .save-btn { background: #d500f9; color: #fff; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .save-btn:hover { opacity: 0.9; box-shadow: 0 0 10px rgba(213, 0, 249, 0.5); }
        
        .radio-label { display: block; margin-top: 10px; font-size: 14px; color: #aaa; cursor: pointer; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
            authDomain: "busuzimayako85-order.firebaseapp.com",
            projectId: "busuzimayako85-order",
            storageBucket: "busuzimayako85-order.firebasestorage.app",
            messagingSenderId: "921095725285",
            appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ログインチェック関数
        window.checkLogin = async function() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === '85admin') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                await loadCurrentStatus();
            } else {
                alert('パスワードが違います。');
            }
        };

        // 現在のFirestoreの値を読み込んで画面にセットする関数
        async function loadCurrentStatus() {
            try {
                const docRef = doc(db, "settings", "schedule");
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('scheduleInput').value = data.text || '';
                    if (data.mode === 'stop') {
                        document.getElementById('modeStop').checked = true;
                    } else {
                        document.getElementById('modeNormal').checked = true;
                    }
                } else {
                    // データが未作成の場合の初期値
                    document.getElementById('scheduleInput').value = '現在【7月以降】受付中（残り2枠）';
                    document.getElementById('modeNormal').checked = true;
                }
            } catch (error) {
                console.error("データ読み込みエラー:", error);
                alert("現在の設定の読み込みに失敗しました。");
            }
        }

        // Firestoreへ設定を保存する関数
        window.updateSchedule = async function() {
            const textVal = document.getElementById('scheduleInput').value;
            const modeVal = document.querySelector('input[name="siteMode"]:checked').value;
            
            try {
                await setDoc(doc(db, "settings", "schedule"), {
                    text: textVal,
                    mode: modeVal,
                    updatedAt: new Date()
                });
                alert("Firestoreの更新が完了しました！");
            } catch (error) {
                console.error("データ保存エラー:", error);
                alert("保存に失敗しました: " + error.message);
            }
        };
    </script>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-top:0; color:#fff;">ADMIN LOGIN</h2>
        <p style="font-size:12px; color:#888;">パスワードを入力してください (初期設定: 85admin)</p>
        <input type="password" id="passwordInput" class="input-text" placeholder="PASSWORD" style="text-align:center;" onkeydown="if(event.key==='Enter') checkLogin()">
        <button class="save-btn" style="width:100%; margin-top:20px;" onclick="checkLogin()">LOGIN</button>
    </div>
</div>

<div class="admin-container" id="adminContent" style="display:none;">
    <h1>busuzimayako85 管理デスク</h1>

    <div class="section">
        <h2>① 受付状況・スケジュールの更新</h2>
        <div style="margin-bottom: 15px;">
            <small style="color: #888;">テンプレートを選択して文字を書き換えてください：</small><br><br>
            <button class="tmpl-btn" onclick="useTemplate('現在【7月以降】受付中（残り2枠）', 'normal')">【受付中】通常モード</button>
            <button class="tmpl-btn" onclick="useTemplate('依頼停止中（8月再開予定）', 'stop')">【停止中】再開予定あり</button>
            <button class="tmpl-btn" onclick="useTemplate('依頼停止中（再開未定）', 'stop')">【停止中】再開未定</button>
        </div>
        
        <input type="text" id="scheduleInput" class="input-text" value="">
        
        <div style="margin-top:15px;">
            <label class="radio-label">
                <input type="radio" name="siteMode" id="modeNormal" value="normal"> 表画面を「通常受付（注文可能）」にする
            </label>
            <label class="radio-label">
                <input type="radio" name="siteMode" id="modeStop" value="stop"> 表画面を「新規依頼停止（シミュレーションのみ）」にする
            </label>
        </div>

        <button class="save-btn" onclick="updateSchedule()">この設定で表画面へ反映する</button>
    </div>
</div>

<script>
    // テンプレート流し込み（入力欄とラジオボタンを同期）
    function useTemplate(text, mode) {
        document.getElementById('scheduleInput').value = text;
        if (mode === 'stop') {
            document.getElementById('modeStop').checked = true;
        } else {
            document.getElementById('modeNormal').checked = true;
        }
    }
</script>
</body>
</html>
