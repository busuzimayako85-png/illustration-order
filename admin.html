<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理画面】busuzimayako85 イラストオーダー</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: Arial, sans-serif; padding: 20px; margin: 0; }
        .admin-container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { color: #fff; border-bottom: 2px solid #d500f9; padding-bottom: 10px; font-size: 28px; margin-top: 0; }
        h2 { color: #00e5ff; margin-top: 30px; font-size: 20px; }
        .section { background: #252525; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
        .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#0b0b0b; display:flex; justify-content:center; align-items:center; z-index:1000; }
        .login-box { background:#1e1e1e; padding:40px; border-radius:8px; border:2px solid #d500f9; text-align:center; max-width:400px; width:90%; }
        .tmpl-btn { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; margin-right: 5px; margin-bottom: 5px; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .input-text { width: 100%; padding: 12px; background: #121212; color: #fff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; margin-top: 10px; font-size: 16px; }
        .save-btn { background: #d500f9; color: #fff; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .radio-label { display: block; margin-top: 10px; font-size: 14px; color: #aaa; cursor: pointer; }
        .order-list { margin-top: 15px; }
        .order-card { background: #1d1d1d; border: 1px solid #333; border-left: 5px solid #00e5ff; border-radius: 4px; padding: 20px; margin-bottom: 15px; }
        .order-card.status-対応中 { border-left-color: #ffea00; }
        .order-card.status-完了 { border-left-color: #00e676; opacity: 0.6; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #2a2a2a; padding-bottom: 10px; margin-bottom: 15px; }
        .name { font-size: 18px; font-weight: bold; color: #fff; }
        .contact { font-size: 13px; color: #00e5ff; margin-top: 4px; }
        .order-date { font-size: 12px; color: #666; text-align: right; }
        .order-details-box { background: #151515; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; line-height: 1.5; }
        .detail-item-title { color: #d500f9; font-weight: bold; margin-bottom: 4px; }
        .detail-bullet { color: #bbb; padding-left: 10px; margin: 2px 0; }
        .comment-box { background: #221a24; border-left: 3px solid #d500f9; padding: 10px; font-size: 13px; margin-bottom: 15px; white-space: pre-wrap; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #2a2a2a; padding-top: 12px; }
        .order-total { font-size: 16px; font-weight: bold; color: #ff1744; }
        .status-select { background: #121212; color: #fff; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .delete-btn { background: #331111; color: #ff5252; border: 1px solid #552222; padding: 6px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
            authDomain: "busuzimayako85-order.firebaseapp.com",
            projectId: "busuzimayako85-order",
            storageBucket: "busuzimayako85-order.firebasestorage.app",
            messagingSenderId: "921095725285",
            appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
        }));

        const TRANSLATIONS = { base: { face: 'フェイスアップ', bust: 'バストアップ', full: '全身' }, bg: { none: '背景なし', simple: '簡易背景', custom: 'しっかり背景(指定あり)', random: 'しっかり背景(おまかせ)' } };
        
        let allOrders = [];
        let currentFilter = '全て';

        window.checkLogin = async () => {
            if (document.getElementById('passwordInput').value === '85admin') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                onSnapshot(query(collection(db, "orders"), orderBy("createdAt", "desc")), (snap) => {
                    allOrders = [];
                    snap.forEach(d => allOrders.push({id: d.id, ...d.data()}));
                    render();
                });
                const s = await getDoc(doc(db, "settings", "schedule"));
                if(s.exists()){
                    document.getElementById('scheduleInput').value = s.data().text;
                    document.getElementById(s.data().mode === 'stop' ? 'modeStop' : 'modeNormal').checked = true;
                }
            } else alert('パスワードが違います。');
        };

        window.setFilter = (v) => { currentFilter = v; render(); };

        window.copyStatusUrl = (id) => {
        const url = `https://illustration-order-cwby.vercel.app/status.html?id=${id}`;
        navigator.clipboard.writeText(url).then(() => alert("URLをコピーしました！"));
        };

        function render() {
            const container = document.getElementById('orderListContainer');
            container.innerHTML = '';
            const filtered = allOrders.filter(o => currentFilter === '全て' || (o.status || '未対応') === currentFilter);
            
            filtered.forEach(data => {
                const status = data.status || '未対応';
                const t = data.createdAt?.toDate();
                const dateStr = t ? `${t.getFullYear()}/${t.getMonth()+1}/${t.getDate()} ${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}` : '---';

                let dHtml = '';
                if(Array.isArray(data.details)) {
                    data.details.forEach((i, idx) => {
                        let diffs = [];
                        if(i.faceDiff > 0) diffs.push(`表情差分×${i.faceDiff}`);
                        if(i.poseDiff > 0) diffs.push(`ポーズ差分×${i.poseDiff}`);
                        if(i.clothDiff > 0) diffs.push(`服装差分×${i.clothDiff}`);
                        dHtml += `<div style="margin-bottom:8px;">
                            <div class="detail-item-title">🎨 イラスト #${idx + 1}</div>
                            <div class="detail-bullet">・ベース: ${TRANSLATIONS.base[i.base] || i.base}</div>
                            <div class="detail-bullet">・背景: ${TRANSLATIONS.bg[i.bg] || i.bg}</div>
                            <div class="detail-bullet">・差分オプション: ${diffs.length > 0 ? diffs.join(', ') : 'なし'}</div>
                        </div>`;
                    });
                }
                
                container.insertAdjacentHTML('beforeend', `
                    <div class="order-card status-${status}">
                        <div class="order-header">
                            <div>
                                <div class="name">${data.clientName || '名前なし'}</div>
                                <div class="contact">🔑 連絡先: ${data.clientContact || '未記入'}</div>
                            </div>
                            <div class="order-date">${dateStr}</div>
                        </div>
                        <div class="order-details-box">${dHtml}</div>
                        ${data.clientComment ? `<div class="comment-box"><strong>💬 メッセージ・要望:</strong><br>${data.clientComment}</div>` : ''}
                        <div class="order-footer">
                            <div class="order-total">合計概算: ${(data.finalTotal || 0).toLocaleString()} 円</div>
                            <div style="display:flex; gap:8px; align-items:center;">
                                <button class="tmpl-btn" style="background:#00e5ff; color:#000; font-weight:bold; border:none;" onclick="window.copyStatusUrl('${data.id}')">🔗 URLコピー</button>
                                <select class="status-select" onchange="window.updateStatus('${data.id}', this.value)">
                                    <option value="未対応" ${status==='未対応'?'selected':''}>🔴 未対応</option>
                                    <option value="対応中" ${status==='対応中'?'selected':''}>🟡 対応中</option>
                                    <option value="完了" ${status==='完了'?'selected':''}>🟢 完了</option>
                                </select>
                                <button class="delete-btn" onclick="window.del('${data.id}')">削除</button>
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        window.updateStatus = async (id, s) => await updateDoc(doc(db, "orders", id), { status: s });
        window.del = async (id) => { if(confirm("削除してもよろしいですか？")) await deleteDoc(doc(db, "orders", id)); };
        window.updateSchedule = async () => { await setDoc(doc(db, "settings", "schedule"), { text: document.getElementById('scheduleInput').value, mode: document.querySelector('input[name="siteMode"]:checked').value }); alert("保存しました"); };
        window.useTemplate = (t, m) => { document.getElementById('scheduleInput').value = t; document.getElementById(m==='stop'?'modeStop':'modeNormal').checked = true; };
    </script>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>ADMIN LOGIN</h2>
            <input type="password" id="passwordInput" class="input-text" placeholder="PASSWORD">
            <button class="save-btn" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>
    <div class="admin-container" id="adminContent" style="display:none;">
        <h1>busuzimayako85 管理デスク</h1>
        <div class="section">
            <h2>① 受付状況・スケジュール</h2>
            <button class="tmpl-btn" onclick="useTemplate('現在【7月以降】受付中（残り2枠）', 'normal')">【通常】</button>
            <button class="tmpl-btn" onclick="useTemplate('依頼停止中（8月再開予定）', 'stop')">【停止】</button>
            <input type="text" id="scheduleInput" class="input-text">
            <label class="radio-label"><input type="radio" name="siteMode" id="modeNormal" value="normal"> 通常受付</label>
            <label class="radio-label"><input type="radio" name="siteMode" id="modeStop" value="stop"> 依頼停止</label>
            <button class="save-btn" onclick="updateSchedule()">更新</button>
        </div>
        <div class="section">
            <h2>② 受信した相談一覧</h2>
            <select class="status-select" style="width:100%; margin-bottom:15px;" onchange="setFilter(this.value)">
                <option value="全て">▼ すべてのステータスを表示</option>
                <option value="未対応">🔴 未対応のみ</option>
                <option value="対応中">🟡 対応中のみ</option>
                <option value="完了">🟢 完了のみ</option>
            </select>
            <div class="order-list" id="orderListContainer"></div>
        </div>
    </div>
</body>
</html>
