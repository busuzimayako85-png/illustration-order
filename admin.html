<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>busuzimayako85 OFFICIAL ORDER SITE</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
            authDomain: "busuzimayako85-order.firebaseapp.com",
            projectId: "busuzimayako85-order",
            storageBucket: "busuzimayako85-order.firebasestorage.app",
            messagingSenderId: "921095725285",
            appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.sendOrder = async function() {
            const name = document.getElementById('userName').value;
            const message = document.getElementById('userMessage').value;
            const total = document.getElementById('totalDisplay').innerText;
            if(!name || !message) { alert("お名前と詳細を入力してください"); return; }
            try {
                await addDoc(collection(db, "orders"), { name, message, total, date: new Date() });
                alert("送信完了しました！");
            } catch (e) { alert("エラー: " + e.message); }
        };
    </script>
    <style>
        body { background-color: #0b0b0b; color: #f0f0f0; font-family: sans-serif; margin: 0; padding: 20px; }
        .illustration-card { background: #111; border: 1px solid #333; padding: 20px; margin-bottom: 20px; }
        .total-box { margin: 20px 0; padding: 20px; border: 2px solid #ff0055; text-align: center; font-size: 24px; }
        .order-form { background: #222; padding: 20px; border-radius: 8px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #444; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ORDER & ESTIMATION</h1>
    <div id="illustrationContainer"></div>
    <button onclick="addNewCard()">+ 追加</button>
    <button onclick="resetForm()">クリア</button>
    
    <div class="total-box">
        合計: <span id="totalDisplay">0 円</span>
    </div>

    <div class="order-form">
        <h3>CUSTOMER INFO</h3>
        <input type="text" id="userName" placeholder="お名前">
        <textarea id="userMessage" placeholder="ご依頼詳細"></textarea>
        <button onclick="sendOrder()">SEND ORDER</button>
    </div>

    <script>
        const PRICES = { base: { face: 9000, bust: 11000, full: 12000 }, bg: { none: 0, simple: 2000, custom: 3000, random: 6000 }, diff: { faceDiff: 500, poseDiff: 700, clothDiff: 1000 } };
        let cardCount = 0;

        function addNewCard() {
            cardCount++;
            document.getElementById('illustrationContainer').insertAdjacentHTML('beforeend', `
                <div class="illustration-card" id="card_${cardCount}">
                    <h3>ILLUSTRATION #${cardCount}</h3>
                    <select name="base_${cardCount}" onchange="calculate()">
                        <option value="face">フェイスアップ (9,000円)</option>
                        <option value="bust">バストアップ (11,000円)</option>
                        <option value="full">全身 (12,000円)</option>
                    </select>
                </div>`);
            calculate();
        }

        function calculate() {
            let sub = 0;
            document.querySelectorAll('select').forEach(s => {
                sub += PRICES.base[s.value];
            });
            document.getElementById('totalDisplay').innerText = sub.toLocaleString() + ' 円';
        }

        function resetForm() {
            document.getElementById('illustrationContainer').innerHTML = '';
            cardCount = 0;
            calculate();
        }

        window.onload = addNewCard;
    </script>
</body>
</html>
