<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORDER & ESTIMATION</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
            authDomain: "busuzimayako85-order.firebaseapp.com",
            projectId: "busuzimayako85-order",
            storageBucket: "busuzimayako85-order.firebasestorage.app",
            messagingSenderId: "921095725285",
            appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.sendOrder = async function() {
            const name = document.getElementById('userName').value;
            const message = document.getElementById('userMessage').value;
            const total = document.getElementById('totalDisplay').innerText;
            if(!name || !message) { alert("お名前と詳細を入力してください"); return; }
            try {
                await addDoc(collection(db, "orders"), { name, message, total, date: new Date() });
                alert("送信完了しました！");
            } catch (e) { alert("エラー: " + e.message); }
        };
    </script>
    <style>
        body { background-color: #0b0b0b; color: #f0f0f0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; }
        .right-panel { width: 100%; max-width: 800px; margin: auto; }
        .illustration-card { background: #111; border: 1px solid #333; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .card-header { display: flex; justify-content: space-between; border-bottom: 2px solid #ff0055; margin-bottom: 15px; }
        .total-box { margin-top: 30px; padding: 20px; border: 2px solid #ff0055; text-align: center; font-size: 24px; }
        .submit-btn { width: 100%; padding: 15px; background: #ff0055; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="right-panel">
        <h1>ORDER & ESTIMATION</h1>
        <div id="illustrationContainer"></div>
        <button onclick="addNewCard()">+ 追加</button>
        <button onclick="resetForm()">全クリア</button>
        <div class="total-box">合計: <span id="totalDisplay">0 円</span></div>
        <div style="margin-top:20px;">
            <input type="text" id="userName" placeholder="お名前" style="width:100%; padding:10px;"><br><br>
            <textarea id="userMessage" placeholder="ご依頼詳細" style="width:100%; padding:10px;"></textarea>
            <button class="submit-btn" onclick="sendOrder()">SEND ORDER</button>
        </div>
    </div>

<script>
    const PRICES = { base: { face: 9000, bust: 11000, full: 12000 }, bg: { none: 0, simple: 2000, custom: 3000, random: 6000 }, diff: 500 };
    let cardCount = 0;

    function addNewCard() {
        cardCount++;
        const div = document.createElement('div');
        div.className = 'illustration-card';
        div.id = 'card_' + cardCount;
        div.innerHTML = `
            <div class="card-header"><h3>ITEM #${cardCount}</h3><button onclick="removeCard(${cardCount})">削除</button></div>
            <select name="base" onchange="calculate()">
                <option value="face">フェイスアップ (9,000円)</option>
                <option value="bust">バストアップ (11,000円)</option>
                <option value="full">全身 (12,000円)</option>
            </select>
            <select name="bg" onchange="calculate()">
                <option value="none">背景なし (+0円)</option>
                <option value="simple">簡易 (+2,000円)</option>
                <option value="custom">指定 (+3,000円)</option>
                <option value="random">おまかせ (+6,000円)</option>
            </select>
            <div><label><input type="checkbox" name="diff" onchange="calculate()"> 差分追加 (+500円)</label></div>
        `;
        document.getElementById('illustrationContainer').appendChild(div);
        calculate();
    }

    function removeCard(id) { document.getElementById('card_' + id).remove(); calculate(); }
    function resetForm() { document.getElementById('illustrationContainer').innerHTML = ''; cardCount = 0; calculate(); }

    function calculate() {
        let sub = 0;
        document.querySelectorAll('.illustration-card').forEach(card => {
            const base = card.querySelector('select[name="base"]').value;
            const bg = card.querySelector('select[name="bg"]').value;
            const diff = card.querySelector('input[name="diff"]').checked ? PRICES.diff : 0;
            sub += PRICES.base[base] + PRICES.bg[bg] + diff;
        });
        document.getElementById('totalDisplay').innerText = sub.toLocaleString() + ' 円';
    }
    window.onload = addNewCard;
</script>
</body>
</html>
