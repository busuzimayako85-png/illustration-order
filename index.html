<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>busuzimayako85 OFFICIAL ORDER SITE</title>
    <style>
        /* (前の設定はそのまま維持してください。以下の total-box のスタイルを書き換えます) */
        
        /* 金額表示ボックス：日本語化して視認性を向上 */
        .total-box {
            margin-top: 40px;
            padding: 30px;
            background: #1a0007;
            border: 2px solid #ff0055;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
        }
        .subtotal-text { font-size: 14px; color: #aaa; margin-bottom: 5px; }
        
        /* 割引テキストを日本語の太字で見やすく調整 */
        .discount-text { 
            font-size: 18px; 
            color: #ffffff; 
            font-weight: bold; 
            margin-bottom: 15px; 
            padding: 5px;
            background: #330011;
            border-radius: 4px;
        }
        .discount-highlight { color: #7cfc00; }
        
        .total-price { font-size: 42px; font-weight: bold; color: #ff0055; text-shadow: 0 0 15px rgba(255, 0, 85, 0.8); }
        /* (他のスタイルは変更なし) */
    </style>
</head>
<body>
    <!-- (左側パネル等は変更なし) -->

    <!-- 右側：合計金額ボックスの中身だけ修正 -->
    <div class="total-box">
        <div class="subtotal-text" id="subtotalWrapper" style="display:none;">小計: <span id="subtotalDisplay">0 円</span></div>
        <div class="discount-text" id="discountWrapper" style="display:none;">
            <span class="discount-highlight">まとめ買い割引 (<span id="discountPercent">0</span>% OFF)</span>: -<span id="discountDisplay">0 円</span>
        </div>
        <div style="font-size: 13px; letter-spacing: 1px; color: #aaa;">最終合計金額</div>
        <div class="total-price" id="totalDisplay">0 円</div>
    </div>

    <!-- (以下、スクリプト等の他のコードはすべて前回のまま変更ありません) -->
