    <style>
        /* index.html のデザインを完全引き継ぎ */

        }

            letter-spacing: 2px;
            color: #ffffff;
            border-bottom: 2px solid #ff0055;
            padding-bottom: 10px;

        }

        .summary-box {
            background: #161616;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 4px;
            margin-top: 25px;
        }

        .item-row {
            padding: 10px 0;
            border-bottom: 1px dashed #333;
            font-size: 14px;
        }
        .item-row:last-child { border-bottom: none; }

        .price-highlight {
            color: #7cfc00;
            text-shadow: 0 0 5px rgba(124, 252, 0, 0.5);
            font-weight: bold;
        }

        /* 合計金額エリア */
        .total-box {
            margin-top: 30px;
            padding: 20px;
            background: #1a0007;
            border: 1px solid #ff0055;
            border-radius: 4px;
            text-align: center;
        }
        .total-price {
            font-size: 36px;
            font-weight: bold;
            color: #ff0055;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
            margin-top: 5px;
        }

        /* フォーム入力欄 */
        .form-section {
            margin-top: 35px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 14px;
            color: #7cfc00;
            text-shadow: 0 0 5px rgba(124, 252, 0, 0.3);
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }
        .input-field {
            width: 100%;
            padding: 12px 15px;
            background: #000;
            color: #7cfc00;
            border: 1px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .input-field:focus {
            border-color: #ff0055;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        /* ボタン */
        .action-btn {
            width: 100%;
            background: #ff0055;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0 #b3003b;
        }
        .action-btn:hover {
            background: #ff266f;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
