<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONFIRM YOUR ESTIMATION - busuzimayako85</title>
    <style>
        /* index.html のデザインを完全引き継ぎ */
        body {
            background-color: #0b0b0b;
            color: #f0f0f0;
            font-family: 'Impact', 'Arial Black', 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .confirm-container {
            width: 90%;
            max-width: 600px;
            background: #111;
            border: 2px solid #ff0055;
            padding: 40px;
            border-radius: 6px;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.3);
            box-sizing: border-box;
            margin: 20px 0;
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            letter-spacing: 2px;
            color: #ffffff;
            border-bottom: 2px solid #ff0055;
            padding-bottom: 10px;
            text-align: center;
        }

        .summary-box {
            background: #161616;
            border: 1px solid #222;
            padding: 20px;
            border-radius: 4px;
            margin-top: 25px;
        }

        .item-row {
            padding: 12px 0;
            border-bottom: 1px dashed #333;
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .item-row:last-child { border-bottom: none; }

        .bullet-item {
            display: block;
            padding-left: 15px;
            color: #ccc;
        }

        /* 合計金額エリア */
        .total-box {
            margin-top: 30px;
            padding: 20px;
            background: #1a0007;
            border: 1px solid #ff0055;
            border-radius: 4px;
            text-align: center;
        }
        .total-price {
            font-size: 36px;
            font-weight: bold;
            color: #ff0055;
            text-shadow: 0 0 15px rgba(255, 0, 85, 0.8);
            margin-top: 5px;
        }

        /* フォーム入力欄 */
        .form-section {
            margin-top: 35px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            font-size: 14px;
            color: #7cfc00;
            text-shadow: 0 0 5px rgba(124, 252, 0, 0.3);
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
        }
        .input-field {
            width: 100%;
            padding: 12px 15px;
            background: #000;
            color: #7cfc00;
            border: 1px solid #333;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .input-field:focus {
            border-color: #ff0055;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        /* ボタン */
        .action-btn {
            width: 100%;
            background: #ff0055;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0 #b3003b;
        }
        .action-btn:hover {
            background: #ff266f;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

<div class="confirm-container">
    <h1>ESTIMATION CONFIRM</h1>
    
    <p style="font-size: 13px; color: #aaa; text-align: center; margin-top: 10px;">ご選択いただいたお見積もりシミュレーションの内容です。</p>

    <!-- 選択内容がここに自動でリストアップされます -->
    <div class="summary-box" id="summaryList">
        <p style="color: #666; text-align: center; font-size: 14px;">読み込み中...</p>
    </div>

    <!-- 最終合計金額 -->
    <div class="total-box">
        <div style="font-size: 12px; color: #aaa; letter-spacing: 1px;">ESTIMATED TOTAL (概算合計金額)</div>
        <div class="total-price" id="finalTotalDisplay">0 円</div>
    </div>

    <!-- 連絡先入力フォーム -->
    <div class="form-section">
        <div class="input-group">
            <span class="input-label">YOUR NAME (お名前 / ニックネーム可)</span>
            <input type="text" id="clientName" class="input-field" placeholder="例: 毒島太郎">
        </div>
        <div class="input-group">
            <span class="input-label">CONTACT INFO (ご連絡先: XのID、各種SNS、メールなど)</span>
            <input type="text" id="clientContact" class="input-field" placeholder="例: X @busuzimayako85">
        </div>

        <button type="button" class="action-btn" id="submitBtn">SEND CONSULTATION (この内容で相談する)</button>
        <a href="index.html" class="back-link">← 見積もりをやり直す</a>
    </div>
</div>

<script>
    // ─── 【表示方法の修正】各要素を箇条書きで改行表示させる ───
    function initConfirmPage() {
        const estimateDataString = localStorage.getItem('currentEstimate');
        if (!estimateDataString) {
            // ローカル環境でのテスト用にダミーデータを表示
            document.getElementById('finalTotalDisplay').innerText = "24,000 円";
            document.getElementById('summaryList').innerHTML = `
                <div class="item-row">
                    🎨 <span style="color:#fff;">ILLUSTRATION #1</span> :
                    <span class="bullet-item">・バストアップ</span>
                    <span class="bullet-item">・簡易背景</span>
                </div>
                <div class="item-row" style="color:#666; font-size:12px; border-bottom:none;">※ローカル環境のため、モックデータを表示しています。テスト送信は可能です。</div>
            `;
            return;
        }

        try {
            const data = JSON.parse(estimateDataString);
            
            // 金額の表示
            document.getElementById('finalTotalDisplay').innerText = data.finalTotal.toLocaleString() + " 円";

            // 選択された内訳テキストの作成
            const summaryList = document.getElementById('summaryList');
            summaryList.innerHTML = ''; // クリア

            // 各イラストカードの内訳を箇条書きで構築
            data.cards.forEach((card, index) => {
                const row = document.createElement('div');
                row.className = 'item-row';
                
                let baseName = card.base === 'face' ? 'フェイスアップ' : card.base === 'bust' ? 'バストアップ' : '全身';
                let bgName = '背景なし';
                if(card.bg === 'simple') bgName = '簡易背景';
                if(card.bg === 'custom') bgName = 'しっかり背景(指定あり)';
                if(card.bg === 'random') bgName = 'しっかり背景(おまかせ)';

                // タイトル行をセット
                let contentHtml = `🎨 <span style="color:#fff;">ILLUSTRATION #${index + 1}</span> :`;
                
                // 各項目を改行（・）の付きで追加
                contentHtml += `<span class="bullet-item">・${baseName}</span>`;
                contentHtml += `<span class="bullet-item">・${bgName}</span>`;

                if(card.faceDiff > 0) contentHtml += `<span class="bullet-item">・表情差分 (${card.faceDiff}枚)</span>`;
                if(card.poseDiff > 0) contentHtml += `<span class="bullet-item">・ポーズ差分 (${card.poseDiff}枚)</span>`;
                if(card.clothDiff > 0) contentHtml += `<span class="bullet-item">・服装差分 (${card.clothDiff}枚)</span>`;

                row.innerHTML = contentHtml;
                summaryList.appendChild(row);
            });

            // 割引がある場合は割引の行も追加
            if (data.discountAmount > 0) {
                const discountRow = document.createElement('div');
                discountRow.className = 'item-row';
                discountRow.style.color = '#7cfc00';
                discountRow.style.borderTop = '1px solid #333';
                discountRow.style.marginTop = '10px';
                discountRow.innerHTML = `🉐 複数枚割引 (${data.discountPercent}% OFF) : -${data.discountAmount.toLocaleString()} 円`;
                summaryList.appendChild(discountRow);
            }
        } catch(e) {
            console.error("データ解析エラー:", e);
        }
    }

    document.addEventListener("DOMContentLoaded", initConfirmPage);
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // Firebase接続設定
    const firebaseConfig = {
        apiKey: "AIzaSyDi4twz34suKR2KXztm19FbUF-dtJN4OQU",
        authDomain: "busuzimayako85-order.firebaseapp.com",
        projectId: "busuzimayako85-order",
        storageBucket: "busuzimayako85-order.firebasestorage.app",
        messagingSenderId: "921095725285",
        appId: "1:921095725285:web:d65f6accf6ddb28765f40c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Firebase(Firestore) へ相談データを送信する処理
    async function submitConsultation() {
        const name = document.getElementById('clientName').value.trim();
        const contact = document.getElementById('clientContact').value.trim();

        if (!name || !contact) {
            alert('お名前とご連絡先は必須入力です！');
            return;
        }

        let estimateData = { cards: [{ base: "bust", bg: "simple", faceDiff: 0, poseDiff: 0, clothDiff: 0 }], finalTotal: 2400 };
        const estimateDataString = localStorage.getItem('currentEstimate');
        if (estimateDataString) {
            estimateData = JSON.parse(estimateDataString);
        }

        try {
            await addDoc(collection(db, "orders"), {
                clientName: name,
                clientContact: contact,
                details: estimateData.cards,
                finalTotal: estimateData.finalTotal,
                status: "未対応",
                createdAt: new Date()
            });

            alert('ありがとうございます！相談メッセージが送信されました。毒島からの連絡をお待ちください。');
            
            localStorage.removeItem('currentEstimate');
            window.location.href = 'index.html';

        } catch (error) {
            console.error("送信エラー:", error);
            alert('送信に失敗しました。時間をおいて再度お試しください。: ' + error.message);
        }
    }

    document.getElementById('submitBtn').addEventListener('click', submitConsultation);
</script>
</body>
</html>
